name: Check for Updates

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: 

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
    
      ##########################
      # 1. Fetch Versions via APK (Most Reliable)
      ##########################
      - name: Fetch latest DNSCrypt-proxy (Alpine Edge)
        run: |
          # Run apk search inside an actual Alpine Edge container
          LATEST=$(docker run --rm alpine:edge sh -c "apk update > /dev/null && apk search dnscrypt-proxy" | grep -oE 'dnscrypt-proxy-[0-9.a-z-]+' | sed 's/dnscrypt-proxy-//' | head -n 1)
          
          if [ -z "$LATEST" ]; then
            echo "Error: Could not find dnscrypt-proxy version"
            exit 1
          fi
          echo "DNSCRYPT_LATEST_VERSION=$LATEST" >> $GITHUB_ENV
          echo "Fetched DNSCrypt: $LATEST"

      - name: Fetch latest Unbound (Alpine Edge)
        run: |
          # Use -x to match the exact package name only
          # This prevents matching things like 'unbound-libs' or 'unbound-daemon'
          LATEST=$(docker run --rm alpine:edge sh -c "apk update > /dev/null && apk search -x unbound" | grep -oE 'unbound-[0-9.a-z-]+' | sed 's/unbound-//' | head -n 1)
          
          if [ -z "$LATEST" ] || [[ "$LATEST" == 0.1.0* ]]; then
            echo "Error: Fetched suspicious version ($LATEST). Double-checking..."
            # Fallback check
            LATEST=$(docker run --rm alpine:edge sh -c "apk update > /dev/null && apk info unbound" | grep "unbound-" | head -n 1 | cut -d' ' -f1 | sed 's/unbound-//')
          fi

          echo "UNBOUND_LATEST_VERSION=$LATEST" >> $GITHUB_ENV
          echo "Verified Unbound: $LATEST"

      ##########################
      # 2. Compare and Update Dockerfile
      ##########################
      - name: Check if update is required
        id: check
        run: |
          UPDATE_IMAGE=false
          
          # Extract current versions from Dockerfile
          CURRENT_UNBOUND=$(grep -Eo "ARG UNBOUND_VERSION=[0-9.a-z-]+" Dockerfile | cut -d= -f2)
          CURRENT_DNSCRYPT=$(grep -Eo "ARG DNSCRYPT_VERSION=[0-9.a-z-]+" Dockerfile | cut -d= -f2)
          
          if [ "$CURRENT_UNBOUND" != "${{ env.UNBOUND_LATEST_VERSION }}" ]; then UPDATE_IMAGE=true; fi
          if [ "$CURRENT_DNSCRYPT" != "${{ env.DNSCRYPT_LATEST_VERSION }}" ]; then UPDATE_IMAGE=true; fi
          
          echo "update_required=$UPDATE_IMAGE" >> $GITHUB_OUTPUT

      - name: Update Dockerfile
        if: steps.check.outputs.update_required == 'true'
        run: |
          sed -i "s/^ARG UNBOUND_VERSION=.*/ARG UNBOUND_VERSION=${{ env.UNBOUND_LATEST_VERSION }}/" Dockerfile
          sed -i "s/^ARG DNSCRYPT_VERSION=.*/ARG DNSCRYPT_VERSION=${{ env.DNSCRYPT_LATEST_VERSION }}/" Dockerfile

      ##########################
      # 3. Create Pull Request
      ##########################
      - name: Create Pull Request
        if: steps.check.outputs.update_required == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-update-alpine-deps
          base: "dev"
          delete-branch: true
          commit-message: "chore: bump Unbound to ${{ env.UNBOUND_LATEST_VERSION }} and DNSCrypt to ${{ env.DNSCRYPT_LATEST_VERSION }}"
          title: "chore: Update Alpine Edge Dependencies"
          body: |
            Automatic version bump using the Alpine Edge package manager.
            
            - **Unbound**: `${{ env.UNBOUND_LATEST_VERSION }}`
            - **DNSCrypt-proxy**: `${{ env.DNSCRYPT_LATEST_VERSION }}`