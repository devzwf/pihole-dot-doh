name: Check for Updates

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: 

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl grep

      - name: Checkout code
        uses: actions/checkout@v6
    
      ##########################
      # 1. Fetch Versions via Alpine Search API
      ##########################
      - name: Fetch latest DNSCrypt-proxy (Alpine Edge)
        run: |
          # Use the search API which is more reliable than the RPC endpoint
          URL="https://pkgs.alpinelinux.org/packages?name=dnscrypt-proxy&branch=edge&repo=community&arch=x86_64"
          RESPONSE=$(curl -s -H "Accept: application/json" "$URL")
          LATEST=$(echo "$RESPONSE" | jq -r '.[0].version' 2>/dev/null || echo "")
          
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Error: Could not parse DNSCrypt version. API Response: $RESPONSE"
            exit 1
          fi
          echo "DNSCRYPT_LATEST_VERSION=$LATEST" >> $GITHUB_ENV

      - name: Fetch latest Unbound (Alpine Edge)
        run: |
          # Querying Unbound from the edge main repository
          URL="https://pkgs.alpinelinux.org/packages?name=unbound&branch=edge&repo=main&arch=x86_64"
          RESPONSE=$(curl -s -H "Accept: application/json" "$URL")
          LATEST=$(echo "$RESPONSE" | jq -r '.[0].version' 2>/dev/null || echo "")
          
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Error: Could not parse Unbound version. API Response: $RESPONSE"
            exit 1
          fi
          echo "UNBOUND_LATEST_VERSION=$LATEST" >> $GITHUB_ENV

      ##########################
      # 2. Compare and Update Dockerfile
      ##########################
      - name: Check if update is required
        id: check
        run: |
          UPDATE_IMAGE=false
          # Extract versions from Dockerfile - supports alpha/numeric and release suffixes like -r1
          CURRENT_UNBOUND=$(grep -Eo "ARG UNBOUND_VERSION=[0-9.a-z-]+" Dockerfile | cut -d= -f2)
          CURRENT_DNSCRYPT=$(grep -Eo "ARG DNSCRYPT_VERSION=[0-9.a-z-]+" Dockerfile | cut -d= -f2)
          
          if [ "$CURRENT_UNBOUND" != "${{ env.UNBOUND_LATEST_VERSION }}" ]; then UPDATE_IMAGE=true; fi
          if [ "$CURRENT_DNSCRYPT" != "${{ env.DNSCRYPT_LATEST_VERSION }}" ]; then UPDATE_IMAGE=true; fi
          
          echo "update_required=$UPDATE_IMAGE" >> $GITHUB_OUTPUT

      - name: Update Dockerfile
        if: steps.check.outputs.update_required == 'true'
        run: |
          sed -i "s/^ARG UNBOUND_VERSION=.*/ARG UNBOUND_VERSION=${{ env.UNBOUND_LATEST_VERSION }}/" Dockerfile
          sed -i "s/^ARG DNSCRYPT_VERSION=.*/ARG DNSCRYPT_VERSION=${{ env.DNSCRYPT_LATEST_VERSION }}/" Dockerfile

      ##########################
      # 3. Create Pull Request
      ##########################
      - name: Create Pull Request
        if: steps.check.outputs.update_required == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-update-alpine-deps
          base: "dev"
          delete-branch: true
          commit-message: "chore: bump Unbound to ${{ env.UNBOUND_LATEST_VERSION }} and DNSCrypt to ${{ env.DNSCRYPT_LATEST_VERSION }}"
          title: "chore: Update Alpine Edge Dependencies"
          body: |
            Automatic version bump for Alpine Edge packages:
            - **Unbound**: `${{ env.UNBOUND_LATEST_VERSION }}`
            - **DNSCrypt-proxy**: `${{ env.DNSCRYPT_LATEST_VERSION }}`
            
            This ensures the app uses the latest security patches available in the rolling branch.