name: Check for Updates

on:
  schedule:
    # Run daily at 07:00 UTC
    - cron: '0 7 * * *'
    
  workflow_dispatch: # Allows manual trigger

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Set up dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: jq curl grep tar xz-utils
          version: 1.0
          
      - name: Checkout code
        uses: actions/checkout@v6
    
      ##########################
      # 1. Fetch DNSCrypt-proxy and Unbound
      ##########################
      - name: Fetch latest DNSCrypt-proxy release
        run: |
          # Fetches the latest release tag from the dnscrypt-proxy repo
          LATEST=$(curl -s https://api.github.com/repos/DNSCrypt/dnscrypt-proxy/releases/latest \
            | jq -r '.tag_name')
          echo "DNSCRYPT_LATEST_VERSION=$LATEST" >> $GITHUB_ENV
          echo "DNSCRYPT_LATEST_VERSION=$LATEST"

      - name: Get latest Unbound version
        id: get_version_unbound
        run: |
          URL="https://nlnetlabs.nl/downloads/unbound/"
          CONTENT=$(curl -sL $URL)
          VERSIONS=$(echo "$CONTENT" | sed -n 's/.*unbound-\([0-9.]\+\)\.tar\.gz.*/\1/p')
          LATEST_VERSION=$(echo "$VERSIONS" | sort -V | tail -n 1)
          if [ -z "$LATEST_VERSION" ]; then
            echo "Could not find latest Unbound version" >&2
            exit 1
          fi
          echo "UNBOUND_LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV 
          echo "UNBOUND_LATEST_VERSION=$LATEST_VERSION"  

      ##########################
      # 2. Check if a PR is required
      ##########################
      - name: Check if need new Image
        run: |
          UPDATE_IMAGE=false
          
          # Unbound check
          CURRENT_UNBOUND=$(grep -Eo "ARG UNBOUND_VERSION=[0-9.]+" Dockerfile | cut -d= -f2)
          if [ "$CURRENT_UNBOUND" != "${{ env.UNBOUND_LATEST_VERSION }}" ]; then UPDATE_IMAGE=true; fi
          
          # DNSCrypt check (Look for ARG DNSCRYPT_VERSION in Dockerfile)
          CURRENT_DNSCRYPT=$(grep -Eo 'ARG DNSCRYPT_VERSION=[0-9.]+' Dockerfile | cut -d= -f2)
          if [ "$CURRENT_DNSCRYPT" != "${{ env.DNSCRYPT_LATEST_VERSION }}" ]; then UPDATE_IMAGE=true; fi
          
          echo "UPDATE_IMAGE=$UPDATE_IMAGE" >> $GITHUB_ENV
          echo "UPDATE_IMAGE=$UPDATE_IMAGE"

      ##########################
      # 3. Create PR if Unbound/DNSCrypt changed
      ##########################
      - name: Update Dockerfile
        if: env.UPDATE_IMAGE == 'true'
        run: |
          sed -i "s/^ARG UNBOUND_VERSION=.*/ARG UNBOUND_VERSION=${{ env.UNBOUND_LATEST_VERSION }}/" Dockerfile
          sed -i "s/^ARG DNSCRYPT_VERSION=.*/ARG DNSCRYPT_VERSION=${{ env.DNSCRYPT_LATEST_VERSION }}/" Dockerfile

      - name: Create Pull Request
        if: env.UPDATE_IMAGE == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-deps-${{ env.UNBOUND_LATEST_VERSION }}-${{ env.DNSCRYPT_LATEST_VERSION }}
          base: "dev"
          delete-branch: true
          commit-message: |
            chore: Update Unbound and/or DNSCrypt-proxy
            Updates:
            - UNBOUND=${{ env.UNBOUND_LATEST_VERSION }}
            - DNSCRYPT=${{ env.DNSCRYPT_LATEST_VERSION }}
          title: |
            chore: Update Unbound and/or DNSCrypt-proxy
          body: |
            This PR updates the Dockerfile with the following versions:

            **Unbound**
            - Version : ${{ env.UNBOUND_LATEST_VERSION }}

            **DNSCrypt-proxy**
            - Version: ${{ env.DNSCRYPT_LATEST_VERSION }}

            The multi-arch Docker image will be rebuilt automatically when this PR is merged.
            Please verify this builds correctly on `dev` before merging.