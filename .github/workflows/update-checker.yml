name: Check for Updates

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: 

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Set up dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: jq curl grep
          version: 1.0
          
      - name: Checkout code
        uses: actions/checkout@v6
    
      ##########################
      # 1. Fetch DNSCrypt (Alpine) and Unbound
      ##########################
      - name: Fetch latest DNSCrypt-proxy (Alpine Edge)
        run: |
          # Queries the Alpine Package Index for the 'edge' branch version
          # We use 'edge' because it contains the most recent updates
          LATEST=$(curl -s "https://pkgs.alpinelinux.org/package/edge/community/x86_64/dnscrypt-proxy" \
            | grep -oP '(?<=<span class="version">).*?(?=</span>)' | head -n 1)
          
          if [ -z "$LATEST" ]; then
            echo "Failed to fetch version from Alpine Index" >&2
            exit 1
          fi
          echo "DNSCRYPT_LATEST_VERSION=$LATEST" >> $GITHUB_ENV
          echo "DNSCRYPT_LATEST_VERSION=$LATEST"

      - name: Get latest Unbound version
        run: |
          URL="https://nlnetlabs.nl/downloads/unbound/"
          CONTENT=$(curl -sL $URL)
          VERSIONS=$(echo "$CONTENT" | sed -n 's/.*unbound-\([0-9.]\+\)\.tar\.gz.*/\1/p')
          LATEST_VERSION=$(echo "$VERSIONS" | sort -V | tail -n 1)
          echo "UNBOUND_LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV 
          echo "UNBOUND_LATEST_VERSION=$LATEST_VERSION"  

      ##########################
      # 2. Check and Update
      ##########################
      - name: Check if need new Image
        run: |
          UPDATE_IMAGE=false
          
          # Unbound check
          CURRENT_UNBOUND=$(grep -Eo "ARG UNBOUND_VERSION=[0-9.]+" Dockerfile | cut -d= -f2)
          if [ "$CURRENT_UNBOUND" != "${{ env.UNBOUND_LATEST_VERSION }}" ]; then UPDATE_IMAGE=true; fi
          
          # DNSCrypt check (Matches Alpine format like 2.1.15-r1)
          CURRENT_DNSCRYPT=$(grep -Eo 'ARG DNSCRYPT_VERSION=[0-9.a-z-]+' Dockerfile | cut -d= -f2)
          if [ "$CURRENT_DNSCRYPT" != "${{ env.DNSCRYPT_LATEST_VERSION }}" ]; then UPDATE_IMAGE=true; fi
          
          echo "UPDATE_IMAGE=$UPDATE_IMAGE" >> $GITHUB_ENV

      - name: Update Dockerfile
        if: env.UPDATE_IMAGE == 'true'
        run: |
          sed -i "s/^ARG UNBOUND_VERSION=.*/ARG UNBOUND_VERSION=${{ env.UNBOUND_LATEST_VERSION }}/" Dockerfile
          sed -i "s/^ARG DNSCRYPT_VERSION=.*/ARG DNSCRYPT_VERSION=${{ env.DNSCRYPT_LATEST_VERSION }}/" Dockerfile

      - name: Create Pull Request
        if: env.UPDATE_IMAGE == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-alpine-deps
          base: "dev"
          commit-message: "chore: bump Unbound to ${{ env.UNBOUND_LATEST_VERSION }} and DNSCrypt to ${{ env.DNSCRYPT_LATEST_VERSION }}"
          title: "chore: Update Alpine packages (Unbound & DNSCrypt)"
          body: |
            Automatic update of dependencies from Alpine Edge:
            - **Unbound**: `${{ env.UNBOUND_LATEST_VERSION }}`
            - **DNSCrypt-proxy**: `${{ env.DNSCRYPT_LATEST_VERSION }}`